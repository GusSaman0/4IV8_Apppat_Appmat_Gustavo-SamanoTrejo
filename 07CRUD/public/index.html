<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo de CRUD</title>
</head>
<body>
    <header>
        <h1>Ejemplo de Gestion de Usuarios</h1>
    </header>
    <main>
        <section class="formulario-section">
            <h2 id="form-titulo">Agregar Nuevo Usuario</h2>
            <form id="form-usuario">
                <div class="campo">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" placeholder="Aqui a tu nombre" maxlength="60" required>
                    <span id="error-nombre" class="error"></span>
                </div>

                <div class="campo">
                    <label for="nombre">Fecha de Nacimiento</label>
                    <input type="date" id="fecha-nacimiento" required>
                    <span id="error-fecha-nacimiento" class="error"></span>
                </div>

                <div class="campo">
                    <label for="nombre">Nota (0-10)</label>
                    <input type="number" id="nota" placeholder="Por Ejemplo 8.5" min="0" max="10" required>
                    <span id="error-nota" class="error"></span>
                </div>

                <button type="submit" id="btn-guardar">Guardar</button>
                <button type="button" id="btn-cancelar" class="btn-secundario" style="display: none;">Cancelar</button>
            </form>
        </section>
        <section class="table-section">
            <h2>Lista de Usuarios</h2>
            <p id="mensaje-carga">Cargando usuarios...</p>
            <p id="mensaje-vacio" style="display: none;">No hay usuarios para mostrar.</p>
            <table id="tabla-usuarios" style="display: none;">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre Completo</th>
                        <th>Fecha de Nacimiento</th>
                        <th>Nota</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla">
                    
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
