<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Comisiones</title>
    <script src="./JS/Calcular_Comision.js"></script>
</head>
<body>
    <div class="contenedor">
        <h2>Calculadora de Inversión comisiones</h2>
        <form id="formulario" onsubmit="return comisiones()">
            <input type="text" id="sueldo" placeholder="Sueldo">
            <input type="text" id="ventas" placeholder="Ventas">
            <button type="submit">Calcular</button>
        </form>
        <p id="resultado"></p>
    </div>
</body>
</html>
