<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo de formulario y su validación</title>
    <script src="validarformulario.js"></script>
    <link rel="stylesheet" href="Formulario.css">
</head>
<body>
    <div>
        <div class="opcion2">
            <a href="Login.html">Tengo cuenta</a>
        </div>
        <div>
            <p>Ingresar</p>
            <form name = "formulario" method= "post" id="formulario" onsubmit="return validar(this)">
            <label for="nombre"></label>
            <br>
            <div class= "cajitas">
                <input type="text" name = "nombre" id="nombre" placeholder="Nombre de usuario" class="interior_Cajitas">
            </div>
            <br>
            <label for="gmail"></label>
            <br>
            <div class="cajitas">
                <input type="email" name="gmail" id="gmail" placeholder="Correo" class="interior_Cajitas">
            </div>
            <br>
            <label for="password"></label>
            <br>
            <div class="cajitas">
                <input type="password" name="password" id="p" placeholder="Contraseña" class="interior_Cajitas">
            </div>
            <br>
            <div class="Buttons">
                <input type="submit" name="enviar" value="Enviar registro">
                <input type="reset" name="borrar" value="Borrar datos" >
            </div>
            </form>
        </div>
    </div>
</body>
</html>
